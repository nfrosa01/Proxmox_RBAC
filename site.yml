#This file is used by RBAC_Users template in Semaphore. Adjust users.csv in the files folder for any changes to a user(s). If the group associated with the user does not exist yet in Proxmox, it will be created when the template is run in Semaphore.
---
- name: Update PVE Groups for LDAP Users
  hosts: "{{ pve_rbac_node | default('pve01') }}"
  become: true
  gather_facts: false

  pre_tasks:
    - name: Preflight — show node
      debug:
        msg:
          rbac_node_inventory_hostname: "{{ inventory_hostname }}"
          pve_rbac_node_var: "{{ pve_rbac_node | default('pve01') }}"

    - name: Read CSV (users) on controller
      ansible.builtin.read_csv:
        path: "{{ users_csv_path }}"
      register: users_csv
      delegate_to: localhost
      run_once: true

    - name: Share parsed CSV to all hosts
      ansible.builtin.set_fact:
        users_csv_list: "{{ users_csv.list }}"
      run_once: true

    - name: Show first CSV row
      debug:
        var: users_csv.list[0]
      run_once: true

  tasks:
    - name: MARKER — importing groups:group_membership.yml explicitly
      import_role:
        name: groups
        tasks_from: group_membership.yml
