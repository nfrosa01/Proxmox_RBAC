---
# roles/acls/tasks/acl_from_csv.yml
# Simple, safe ACL management with no complex Jinja

- name: MARKER — ACL management starting
  debug:
    msg: "Applying ACLs from CSV"

###############################################################################
# 1. Normalize CSV rows (simple loop)
###############################################################################

- name: Initialize normalized ACL list
  set_fact:
    acl_rows: []

- name: Normalize ACL rows
  set_fact:
    acl_rows: "{{ acl_rows + [ {
        'path': item.path,
        'subject': item.subject,
        'subject_type': item.subject_type,
        'desired_roles': (item.roles | default('') | trim | split(',') | map('trim') | reject('equalto','') | list),
        'desired_propagate': (item.propagate | default('1') | int)
    } ] }}"
  loop: "{{ acls_csv_list }}"
  
###############################################################################
# 2. Load current ACL table (JSON)
###############################################################################

- name: Load current ACLs (JSON)
  command: "pvesh get /access/acl --output-format json"
  register: pve_acl_raw
  changed_when: false

- name: Parse ACL JSON
  set_fact:
    pve_acls: "{{ pve_acl_raw.stdout | from_json }}"

###############################################################################
# 3. Build merged list (desired + current) row-by-row
###############################################################################

- name: Init merged ACL list
  set_fact:
    acl_merged: []

- name: Merge desired + current row-by-row
  set_fact:
    acl_merged: "{{ acl_merged + [ merged ] }}"
  vars:
    current_entries: >-
      {{
        pve_acls
        | selectattr('path','equalto', item.path)
        | selectattr(
            item.subject_type == 'group' and 'ugid' or
            item.subject_type == 'user'  and 'userid' or
            item.subject_type == 'token' and 'tokenid',
            'equalto',
            item.subject
          )
        | list
      }}

    current_roles: "{{ current_entries | map(attribute='roleid') | list }}"
    current_prop: "{{ (current_entries | map(attribute='propagate') | list | first) | default(None) }}"

    merged:
      path: "{{ item.path }}"
      subject: "{{ item.subject }}"
      subject_type: "{{ item.subject_type }}"
      desired_roles: "{{ item.desired_roles }}"
      desired_propagate: "{{ item.desired_propagate }}"
      current_roles: "{{ current_roles }}"
      current_propagate: "{{ current_prop }}"
  loop: "{{ acl_rows }}"
  loop_control:
    label: "{{ item.path }} :: {{ item.subject }}"

###############################################################################
# 4. Show comparison (debug)
###############################################################################

- name: DEBUG | ACL comparison
  debug:
    var: acl_merged
  run_once: true

###############################################################################
# 5. Apply ACL changes
###############################################################################

- name: Apply ACL changes
  command: >
    pveum acl modify {{ item.path }}
    --roles "{{ item.desired_roles | join(',') }}"
    {{ '--groups ' ~ item.subject if item.subject_type == 'group' else '' }}
    {{ '--users ' ~ item.subject if item.subject_type == 'user' else '' }}
    {{ '--tokens ' ~ item.subject if item.subject_type == 'token' else '' }}
    --propagate {{ item.desired_propagate }}
  loop: "{{ acl_merged }}"
  loop_control:
    label: "{{ item.path }} :: {{ item.subject }}"
  when: >
    (item.current_roles | sort != item.desired_roles | sort) or
    (item.current_propagate != item.desired_propagate)
  register: acl_modify
  changed_when: acl_modify.rc == 0
  failed_when: acl_modify.rc not in [0]
