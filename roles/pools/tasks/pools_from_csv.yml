---
# roles/pools/tasks/pools_from_csv.yml
# Simple READ-ONLY version: List pools and members

- name: MARKER — Listing Proxmox Pools
  debug:
    msg: "Listing all pools, comments, and members"

###############################################################################
# 1. Query pools via Proxmox API in JSON format
###############################################################################
- name: Fetch all pools (JSON)
  ansible.builtin.command: >
    pvesh get /pools --output-format json
  register: all_pools_json
  changed_when: false

###############################################################################
# 2. Parse JSON
###############################################################################
- name: Convert pools JSON
  ansible.builtin.set_fact:
    all_pools: "{{ all_pools_json.stdout | from_json }}"

###############################################################################
# 3. Display each pool’s ID, comment, and members
###############################################################################
- name: Show pool details
  ansible.builtin.debug:
    msg:
      poolid: "{{ item.poolid }}"
      comment: "{{ item.comment | default('') }}"
      vm_members: >-
        {{
          item.members
          | selectattr('type','in',['qemu','lxc'])
          | map(attribute='vmid')
          | map('string')
          | list
        }}
      storage_members: >-
        {{
          item.members
          | selectattr('type','equalto','storage')
          | map(attribute='storage')
          | list
        }}
  loop: "{{ all_pools }}"
  loop_control:
    label: "{{ item.poolid }}"
