---
# roles/pools/tasks/pools_from_csv.yml
# Clean & Ansible-2.13 compatible, supporting VMIDs + storage with enforce mode

- name: MARKER — pools_from_csv starting
  debug:
    msg: "Managing pools from CSV"

###############################################################################
# 1. Normalize CSV rows (vms/storage → lists of strings)
###############################################################################
- name: Normalize CSV rows
  ansible.builtin.set_fact:
    pools_clean: >-
      {{
        pools_csv_list
        | map('combine', {
            'desired_vms': (
              item.vms | default('') | string | trim | split(',') | map('trim') | reject('equalto','') | list
            ),
            'desired_storage': (
              item.storage | default('') | string | trim | split(',') | map('trim') | reject('equalto','') | list
            ),
            'allow_move': (item.allow_move | default('0') | int),
            'enforce_membership': (item.enforce_membership | default('0') | int)
          })
        | list
      }}

###############################################################################
# 2. Ensure pools exist (create if missing)
###############################################################################
- name: Ensure pool exists
  ansible.builtin.shell: |
    if ! pveum pool list | awk '{print $1}' | grep -Fxq "{{ item.poolid }}"; then
      pveum pool add "{{ item.poolid }}" --comment "{{ item.comment | default('') }}"
    fi
  args:
    executable: /bin/bash
  loop: "{{ pools_clean }}"
  loop_control:
    label: "{{ item.poolid }}"
  register: pool_add
  changed_when: "'add' in (pool_add.stdout | default(''))"
  failed_when: false

###############################################################################
# 3. Read current membership using pvesh
###############################################################################
- name: Query pool membership via pvesh
  ansible.builtin.command: >
    pvesh get /pools/{{ item.poolid }}
  loop: "{{ pools_clean }}"
  loop_control:
    label: "{{ item.poolid }}"
  register: pools_pvesh
  changed_when: false

###############################################################################
# 4. Build full per-pool objects combining desired + current
###############################################################################
- name: Build pool_rows (final)
  ansible.builtin.set_fact:
    pool_rows: >-
      {{
        range(0, pools_clean | length)
        | list
        | map('int')
        | map('extract', {
            'poolid': pools_clean[item].poolid,
            'comment': pools_clean[item].comment,
            'desired_vms': pools_clean[item].desired_vms,
            'desired_storage': pools_clean[item].desired_storage,
            'allow_move': pools_clean[item].allow_move,
            'enforce_membership': pools_clean[item].enforce_membership,
            'current_members': (pools_pvesh.results[item].stdout | from_json).members | default([])
          })
      }}
  vars:
    extract: |
      {% raw %}
      {% endraw %}

###############################################################################
# 5. Extract current VMIDs + storage
###############################################################################
- name: Normalize current VMIDs and storage
  ansible.builtin.set_fact:
    pool_rows: >-
      {{
        pool_rows
        | map('combine', {
            'current_vms': (
              item.current_members
              | selectattr('type', 'in', ['qemu','lxc'])
              | map(attribute='vmid')
              | map('string')
              | list
            ),
            'current_storage': (
              item.current_members
              | selectattr('type', 'equalto', 'storage')
              | map(attribute='storage')
              | list
            )
          })
        | list
      }}

###############################################################################
# 6. Apply ADDs (VMs)
###############################################################################
- name: Add VMIDs to pool
  ansible.builtin.command: >
    pveum pool modify {{ item.poolid }}
    --vms {{ (item.desired_vms | difference(item.current_vms)) | join(',') }}
    {{ '--allow-move 1' if item.allow_move == 1 else '' }}
  loop: "{{ pool_rows }}"
  loop_control:
    label: "{{ item.poolid }} add-vms"
  when: (item.desired_vms | difference(item.current_vms)) | length > 0
  register: vm_add
  changed_when: vm_add.rc == 0
  failed_when: vm_add.rc not in [0]

###############################################################################
# 7. Apply REMOVES (VMs) if enforce_membership=1
###############################################################################
- name: Remove VMIDs from pool (enforced)
  ansible.builtin.command: >
    pveum pool modify {{ item.poolid }}
    --vms {{ (item.current_vms | difference(item.desired_vms)) | join(',') }}
    --delete 1
  loop: "{{ pool_rows }}"
  loop_control:
    label: "{{ item.poolid }} del-vms"
  when:
    - item.enforce_membership == 1
    - (item.current_vms | difference(item.desired_vms)) | length > 0
  register: vm_del
  changed_when: vm_del.rc == 0
  failed_when: vm_del.rc not in [0]

###############################################################################
# 8. Apply ADDs (storage)
###############################################################################
- name: Add storage to pool
  ansible.builtin.command: >
    pveum pool modify {{ item.poolid }}
    --storage {{ (item.desired_storage | difference(item.current_storage)) | join(',') }}
  loop: "{{ pool_rows }}"
  loop_control:
    label: "{{ item.poolid }} add-storage"
  when: (item.desired_storage | difference(item.current_storage)) | length > 0
  register: st_add
  changed_when: st_add.rc == 0
  failed_when: st_add.rc not in [0]

###############################################################################
# 9. Apply REMOVES (storage) if enforce_membership=1
###############################################################################
- name: Remove storage from pool (enforced)
  ansible.builtin.command: >
    pveum pool modify {{ item.poolid }}
    --storage {{ (item.current_storage | difference(item.desired_storage)) | join(',') }}
    --delete 1
  loop: "{{ pool_rows }}"
  loop_control:
    label: "{{ item.poolid }} del-storage"
  when:
    - item.enforce_membership == 1
    - (item.current_storage | difference(item.desired_storage)) | length > 0
  register: st_del
  changed_when: st_del.rc == 0
  failed_when: st_del.rc not in [0]
