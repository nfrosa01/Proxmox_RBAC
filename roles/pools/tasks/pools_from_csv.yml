---
# READ-ONLY: show desired values from CSV + actual pool state from Proxmox
- name: MARKER — Listing desired + current pool configuration
  debug:
    msg: "Loading CSV + comparing to Proxmox pool state"
###############################################################################
# 1. Normalize CSV rows — SAFE LOOP (works in all Ansible versions)
###############################################################################
- name: Initialize cleaned CSV list
  ansible.builtin.set_fact:
    pools_clean: []

- name: Normalize each CSV row
  ansible.builtin.set_fact:
    pools_clean: "{{ pools_clean + [ {
        'poolid': item.poolid,
        'desired_comment': item.comment | default(''),
        'desired_vms': (item.vms | default('') | string | trim | split(',') | map('trim') | reject('equalto','') | list),
        'desired_storage': (item.storage | default('') | string | trim | split(',') | map('trim') | reject('equalto','') | list),
        'allow_move': (item.allow_move | default('0') | int),
        'enforce_membership': (item.enforce_membership | default('0') | int)
    } ] }}"
  loop: "{{ pools_csv_list }}"
  loop_control:
    label: "{{ item.poolid }}"
###############################################################################
# 2. Query current pool state for each poolid listed in CSV
###############################################################################
- name: Fetch full pool details including members
  ansible.builtin.command: >
    pvesh get /pools/{{ item.poolid }} --output-format json
  loop: "{{ pools_clean }}"
  loop_control:
    label: "{{ item.poolid }}"
  register: pool_details_raw
  changed_when: false
  failed_when: false
###############################################################################
# 3. Build merged objects with current pool state
###############################################################################

- name: Initialize merged list
  ansible.builtin.set_fact:
    pool_merged: []

- name: Merge desired + current info
  ansible.builtin.set_fact:
    pool_merged: "{{ pool_merged + [ {
        'poolid': item.0.poolid,
        # desired values from CSV
        'desired_comment': item.0.desired_comment,
        'desired_vms': item.0.desired_vms,
        'desired_storage': item.0.desired_storage,
        'allow_move': item.0.allow_move,
        'enforce_membership': item.0.enforce_membership,
        # current values from Proxmox API
        'current': (item.1.stdout | from_json)
    } ] }}"
  loop: "{{ pools_clean | zip(pool_details_raw.results) }}"
  loop_control:
    label: "{{ item.0.poolid }}"

###############################################################################
# 4. Display desired vs current state
###############################################################################
- name: Show desired vs current pool configuration
  ansible.builtin.debug:
    msg:
      poolid: "{{ item.poolid }}"

      desired_comment: "{{ item.desired_comment }}"
      desired_vms: "{{ item.desired_vms }}"
      desired_storage: "{{ item.desired_storage }}"
      allow_move: "{{ item.allow_move }}"
      enforce_membership: "{{ item.enforce_membership }}"

      current_comment: "{{ item.current.comment | default('') }}"
      current_vm_members: >-
        {{
          (item.current.members | default([]))
          | selectattr('type','in',['qemu','lxc'])
          | map(attribute='vmid')
          | map('string')
          | list
        }}
      current_storage_members: >-
        {{
          (item.current.members | default([]))
          | selectattr('type','equalto','storage')
          | map(attribute='storage')
          | list
        }}
  loop: "{{ pool_merged }}"
  loop_control:
    label: "{{ item.poolid }}"
