---
# READ‑ONLY: list all pools + comments + members

- name: MARKER — Listing all pools with members
  debug:
    msg: "Collecting Proxmox pool information"

###############################################################################
# 1. Get list of pools (no members here)
###############################################################################
- name: Fetch pool list (top level)
  ansible.builtin.command: >
    pvesh get /pools --output-format json
  register: pool_list_raw
  changed_when: false

- name: Parse pool list JSON
  ansible.builtin.set_fact:
    pool_list: "{{ pool_list_raw.stdout | from_json }}"

###############################################################################
# 2. For each pool → fetch details with members
###############################################################################
- name: Fetch full pool details including members
  ansible.builtin.command: >
    pvesh get /pools/{{ item.poolid }} --output-format json
  loop: "{{ pool_list }}"
  loop_control:
    label: "{{ item.poolid }}"
  register: pool_details_raw
  changed_when: false
  failed_when: false

###############################################################################
# 3. Parse each detail response safely
###############################################################################
- name: Build structured pool info
  ansible.builtin.set_fact:
    pools_full: >-
      {{
        pool_details_raw.results
        | map(attribute='stdout')
        | map('default','{}')
        | map('from_json')
        | list
      }}

###############################################################################
# 4. Display results
###############################################################################
- name: Display pool info
  ansible.builtin.debug:
    msg:
      poolid: "{{ item.poolid }}"
      comment: "{{ item.comment | default('') }}"
      vm_members: >-
        {{
          (item.members | default([]))
          | selectattr('type','in',['qemu','lxc'])
          | map(attribute='vmid')
          | map('string')
          | list
        }}
      storage_members: >-
        {{
          (item.members | default([]))
          | selectattr('type','equalto','storage')
          | map(attribute='storage')
          | list
        }}
  loop: "{{ pools_full }}"
  loop_control:
    label: "{{ item.poolid }}"
