---
# roles/pools/tasks/pools_from_csv.yml
# Clean, fully-updating pool automation for Ansible 2.13

- name: MARKER — pools_from_csv starting
  debug:
    msg: "Managing pools from CSV"

###############################################################################
# 1) Normalize CSV into structured objects
###############################################################################
- name: Normalize CSV into per-pool objects
  ansible.builtin.set_fact:
    pools_clean: >-
      {{
        pools_csv_list | map('combine', {
          'desired_vms': (item.vms | default('') | trim | split(',') | reject('equalto','')),
          'desired_storage': (item.storage | default('') | trim | split(',') | reject('equalto','')),
          'allow_move': (item.allow_move | default('0') | int),
          'enforce_membership': (item.enforce_membership | default('0') | int),
        }) | list
      }}

###############################################################################
# 2) Ensure pool exists (create only if missing)
###############################################################################
- name: Ensure pool exists
  ansible.builtin.shell: |
    if ! pveum pool list | awk '{print $1}' | grep -Fxq "{{ item.poolid }}"; then
      pveum pool add "{{ item.poolid }}" --comment "{{ item.comment | default('') }}"
    fi
  args:
    executable: /bin/bash
  loop: "{{ pools_clean }}"
  loop_control:
    label: "{{ item.poolid }}"
  register: pool_add
  changed_when: "'add' in (pool_add.stdout | default(''))"
  failed_when: false

###############################################################################
# 3) Read pool JSON from pvesh (cluster-wide API)
###############################################################################
- name: Read pool JSON via pvesh
  ansible.builtin.command: >
    pvesh get /pools/{{ item.poolid }}
  loop: "{{ pools_clean }}"
  loop_control:
    label: "{{ item.poolid }}"
  register: pool_json
  changed_when: false

###############################################################################
# 4) Parse current membership safely (Ansible 2.13)
###############################################################################
- name: Build per-row merged structures
  ansible.builtin.set_fact:
    pool_rows: >-
      {{
        range(0, pools_clean | length)
        | map('int')
        | map('extract', pools_clean)
        | zip(pool_json.results)
        | map('community.general.dict_merge', {})    # required for zip merge
        | list
      }}

# But easier to construct explicitly:
- name: Build pool_rows explicitly (safe)
  ansible.builtin.set_fact:
    pool_rows: >-
      {{
        range(0, pools_clean | length)
        | map('int')
        | map('extract', {
            'poolid': pools_clean[item].poolid,
            'comment': pools_clean[item].comment,
            'desired_vms': pools_clean[item].desired_vms,
            'desired_storage': pools_clean[item].desired_storage,
            'allow_move': pools_clean[item].allow_move,
            'enforce_membership': pools_clean[item].enforce_membership,
            'current_json': (pool_json.results[item].stdout | from_json)
          })
      }}
  vars:
    extract: |
      {% raw %}
      {% endraw %}

###############################################################################
# 5) Compute diffs: VMs and Storage
###############################################################################
- name: Compute membership diffs
  ansible.builtin.set_fact:
    pools_with_diffs: >-
      {{
        pool_rows | map('combine', {
          'current_vms': (item.current_json.members | default([])
                         | selectattr('type','in',['qemu','lxc'])
                         | map(attribute='vmid')
                         | list),
          'current_storage': (item.current_json.members | default([])
                             | selectattr('type','equalto','storage')
                             | map(attribute='storage')
                             | list)
        }) | list
      }}

###############################################################################
# 6) Apply additions: VMIDs
###############################################################################
- name: Add VMIDs to pool
  ansible.builtin.command: >
    pveum pool modify {{ item.poolid }}
    --vms {{ (item.desired_vms | difference(item.current_vms)
             | join(',')) }}
    {{ '--allow-move 1' if item.allow_move == 1 else '' }}
  loop: "{{ pools_with_diffs }}"
  loop_control:
    label: "{{ item.poolid }}"
  when: (item.desired_vms | difference(item.current_vms)) | length > 0
  register: vm_add
  changed_when: vm_add.rc == 0
  failed_when: vm_add.rc not in [0]

###############################################################################
# 7) Apply removals: VMIDs (only if enforce_membership=1)
###############################################################################
- name: Remove VMIDs from pool (enforce)
  ansible.builtin.command: >
    pveum pool modify {{ item.poolid }}
    --vms {{ (item.current_vms | difference(item.desired_vms)
             | join(',')) }}
    --delete 1
  loop: "{{ pools_with_diffs }}"
  loop_control:
    label: "{{ item.poolid }}"
  when:
    - item.enforce_membership == 1
    - (item.current_vms | difference(item.desired_vms)) | length > 0
  register: vm_del
  changed_when: vm_del.rc == 0
  failed_when: vm_del.rc not in [0]

###############################################################################
# 8) Apply additions: Storage
###############################################################################
- name: Add storage IDs to pool
  ansible.builtin.command: >
    pveum pool modify {{ item.poolid }}
    --storage {{ (item.desired_storage | difference(item.current_storage)
                 | join(',')) }}
  loop: "{{ pools_with_diffs }}"
  loop_control:
    label: "{{ item.poolid }}"
  when: (item.desired_storage | difference(item.current_storage)) | length > 0
  register: st_add
  changed_when: st_add.rc == 0
  failed_when: st_add.rc not in [0]

###############################################################################
# 9) Apply removals: Storage (only if enforce_membership=1)
###############################################################################
- name: Remove storage IDs from pool (enforce)
  ansible.builtin.command: >
    pveum pool modify {{ item.poolid }}
    --storage {{ (item.current_storage | difference(item.desired_storage)
                 | join(',')) }}
    --delete 1
  loop: "{{ pools_with_diffs }}"
  loop_control:
    label: "{{ item.poolid }}"
  when:
    - item.enforce_membership == 1
    - (item.current_storage | difference(item.desired_storage)) | length > 0
  register: st_del
  changed_when: st_del.rc == 0
  failed_when: st_del.rc not in [0]
