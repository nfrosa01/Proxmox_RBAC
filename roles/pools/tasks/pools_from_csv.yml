---
# READ-ONLY: show desired values from CSV + actual pool state from Proxmox

- name: MARKER — Listing desired + current pool configuration
  debug:
    msg: "Loading CSV + comparing to Proxmox pool state"

###############################################################################
# 1. Normalize CSV rows into desired_* fields
###############################################################################
- name: Normalize CSV rows
  ansible.builtin.set_fact:
    pools_clean: >-
      {{
        pools_csv_list
        | map('combine', {
            'desired_vms': (
              item.vms | default('') | string | trim
              | split(',') | map('trim') | reject('equalto','') | list
            ),
            'desired_storage': (
              item.storage | default('') | string | trim
              | split(',') | map('trim') | reject('equalto','') | list
            ),
            'allow_move': (item.allow_move | default('0') | int),
            'enforce_membership': (item.enforce_membership | default('0') | int)
          })
        | list
      }}

###############################################################################
# 2. Query current pool state for each poolid listed in CSV
###############################################################################
- name: Fetch full pool details including members
  ansible.builtin.command: >
    pvesh get /pools/{{ item.poolid }} --output-format json
  loop: "{{ pools_clean }}"
  loop_control:
    label: "{{ item.poolid }}"
  register: pool_details_raw
  changed_when: false
  failed_when: false

###############################################################################
# 3. Build merged objects with current pool state
###############################################################################
- name: Merge desired + current pool info
  ansible.builtin.set_fact:
    pool_merged: >-
      {{
        range(0, pools_clean | length)
        | list
        | map('int')
        | map('community.general.dict_merge', {
            'poolid': pools_clean[item].poolid,
            'desired_vms': pools_clean[item].desired_vms,
            'desired_storage': pools_clean[item].desired_storage,
            'allow_move': pools_clean[item].allow_move,
            'enforce_membership': pools_clean[item].enforce_membership,
            'desired_comment': pools_clean[item].comment,
            'current': (pool_details_raw.results[item].stdout | from_json)
          })
      }}

###############################################################################
# 4. Display desired vs current state
###############################################################################
- name: Show desired vs current pool configuration
  ansible.builtin.debug:
    msg:
      poolid: "{{ item.poolid }}"

      desired_comment: "{{ item.desired_comment }}"
      desired_vms: "{{ item.desired_vms }}"
      desired_storage: "{{ item.desired_storage }}"
      allow_move: "{{ item.allow_move }}"
      enforce_membership: "{{ item.enforce_membership }}"

      current_comment: "{{ item.current.comment | default('') }}"
      current_vm_members: >-
        {{
          (item.current.members | default([]))
          | selectattr('type','in',['qemu','lxc'])
          | map(attribute='vmid')
          | map('string')
          | list
        }}
      current_storage_members: >-
        {{
          (item.current.members | default([]))
          | selectattr('type','equalto','storage')
          | map(attribute='storage')
          | list
        }}
  loop: "{{ pool_merged }}"
  loop_control:
    label: "{{ item.poolid }}"
