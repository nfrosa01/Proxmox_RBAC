---
# roles/pools/tasks/pools_from_csv.yml
# Simple, reliable Proxmox pool management

- name: Ensure pool exists
  command:
    argv:
      - pvesh
      - create
      - /pools
      - -poolid
      - "{{ item.poolid }}"
  loop: "{{ pools_csv_list }}"
  register: create_pool
  failed_when: create_pool.rc not in [0, 255]
  changed_when: create_pool.rc == 0

- name: Apply pool settings (comment, flags)
  command:
    argv:
      - pvesh
      - set
      - "/pools/{{ item.poolid }}"
      - "-comment"
      - "{{ item.comment | default('') }}"
      - "-allow-move"
      - "{{ item.allow_move }}"
      - "-enforce-membership"
      - "{{ item.enforce_membership }}"
  loop: "{{ pools_csv_list }}"
  register: update_pool
  failed_when: update_pool.rc not in [0]
  changed_when: update_pool.rc == 0

- name: Add storage to pool (if defined)
  command:
    argv:
      - pvesh
      - set
      - "/pools/{{ item.poolid }}"
      - "-storage"
      - "{{ item.storage }}"
  loop: "{{ pools_csv_list }}"
  when: item.storage | length > 0
  failed_when: false
  changed_when: false

- name: Add VMs to pool (if defined)
  command:
    argv:
      - pvesh
      - set
      - "/pools/{{ item.poolid }}"
      - "-vms"
      - "{{ item.vms }}"
  loop: "{{ pools_csv_list }}"
  when: item.vms | length > 0
  failed_when: false
  changed_when: false
