---
# roles/groups/tasks/group_membership.yml
# Update group membership for LDAP-synced users in Proxmox

- name: MARKER — groups/group_membership.yml executing
  debug:
    msg: "Running groups membership (LDAP users)"

# Derive PVE group names from CSV 'groups' column.
# Notes:
# - we remove whitespace with regex_replace
# - we split on commas into a list
# - we flatten and unique the result
- name: Derive groups from CSV
  ansible.builtin.set_fact:
    _csv_groups: >-
      {{
        users_csv_list
        | map(attribute='groups')
        | select('defined')
        | map('regex_replace','\\s+','')
        | map('split', ',')
        | flatten
        | reject('equalto','')
        | unique
      }}
  run_once: true

# Load the full PVE user table (used to validate user existence & realm spelling)
- name: Load current PVE user table
  ansible.builtin.command: "pveum user list"
  register: pve_users_table
  changed_when: false

# Get the current groups for each CSV user (exact userid@realm match).
- name: Get current PVE groups for each user
  ansible.builtin.shell: |
    set -o pipefail
    pveum user list | awk -v u="{{ item.username }}@{{ item.realm }}" '$1==u{print $6}'
  args:
    executable: /bin/bash
  loop: "{{ users_csv_list }}"
  loop_control:
    label: "{{ item.username }}@{{ item.realm }}"
  register: current_groups
  changed_when: false

# Compute the desired groups string per user from CSV (normalize spaces).
- name: Compute desired groups list per user (normalized CSV)
  ansible.builtin.set_fact:
    _desired_groups_list: >-
      {{
        users_csv_list
        | map(attribute='groups')
        | map('regex_replace','\\s+','')
        | list
      }}
  run_once: true

# DEBUG — show decision inputs so it's obvious why we run or skip
- name: DEBUG | current vs desired (per user)
  ansible.builtin.debug:
    msg:
      user: "{{ users_csv_list[idx].username }}@{{ users_csv_list[idx].realm }}"
      exists_in_pve: "{{ (pve_users_table.stdout | default('')) is search(users_csv_list[idx].username ~ '@' ~ users_csv_list[idx].realm) }}"
      current_groups: "{{ (current_groups.results[idx].stdout | default('')) }}"
      desired_groups: "{{ _desired_groups_list[idx] | default('') }}"
      will_run_modify: >-
        {{
          ((pve_users_table.stdout | default('')) is search(users_csv_list[idx].username ~ '@' ~ users_csv_list[idx].realm))
          and
          ((current_groups.results[idx].stdout | default('')) != (_desired_groups_list[idx] | default('')))
        }}
  loop: "{{ range(0, users_csv_list | length) | list }}"
  loop_control:
    index_var: idx

# Apply only if user exists and current != desired.
- name: Apply PVE group membership when different
  ansible.builtin.command: >
    pveum user modify {{ users_csv_list[idx].username }}@{{ users_csv_list[idx].realm }}
    --groups "{{ _desired_groups_list[idx] }}"
  loop: "{{ range(0, users_csv_list | length) | list }}"
  loop_control:
    index_var: idx
    label: "{{ users_csv_list[idx].username }}@{{ users_csv_list[idx].realm }}"
  when: >
    (pve_users_table.stdout | default('')) is search(users_csv_list[idx].username ~ '@' ~ users_csv_list[idx].realm)
    and
    (current_groups.results[idx].stdout | default('')) != (_desired_groups_list[idx] | default(''))
  register: mod_membership
  changed_when: mod_membership.rc == 0
  failed_when: mod_membership.rc not in [0, 2]
  # Uncomment if you want this to execute even when someone runs the template with --check:
  # check_mode: no
