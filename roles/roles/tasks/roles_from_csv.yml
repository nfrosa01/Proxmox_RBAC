---
# roles/roles/tasks/roles_from_csv.yml
# Simple + reliable Proxmox RBAC role management

- name: Load current Proxmox roles
  command: "pveum role list --output-format=json"
  register: pve_roles_raw
  changed_when: false

- name: Parse role IDs
  set_fact:
    existing_role_ids: >-
      {{ pve_roles_raw.stdout | from_json | map(attribute='roleid') | list }}

# CREATE roles that do not exist
- name: Create missing roles
  command: >
    pveum role add {{ item.roleid }}
    --privs "{{ item.privs }}"
  loop: "{{ roles_csv_list }}"
  when: item.roleid not in existing_role_ids
  register: add_roles
  failed_when: add_roles.rc not in [0,5]   # 5 = already exists (safe)
  changed_when: add_roles.rc == 0

# UPDATE roles that already exist
- name: Update existing roles (overwrite privs)
  command: >
    pveum role modify {{ item.roleid }}
    --privs "{{ item.privs }}"
  loop: "{{ roles_csv_list }}"
  when: item.roleid in existing_role_ids
  register: modify_roles
  failed_when: modify_roles.rc not in [0]
  changed_when: modify_roles.rc == 0
