---
# roles/roles/tasks/roles_from_csv.yml
# Create/Update Proxmox custom roles from roles.csv — jq-free version

- name: MARKER — roles/roles_from_csv.yml executing
  debug:
    msg: "Running custom role management from CSV"

###############################################################################
# 1) Load existing Proxmox roles in JSON format
###############################################################################
- name: Load current PVE roles (JSON)
  ansible.builtin.command: "pveum role list --output-format=json"
  register: pve_roles_json
  changed_when: false

- name: Parse roles JSON
  ansible.builtin.set_fact:
    pve_role_list: "{{ pve_roles_json.stdout | from_json }}"

- name: Extract role IDs
  ansible.builtin.set_fact:
    existing_role_ids: "{{ pve_role_list | map(attribute='roleid') | list }}"

###############################################################################
# 2) Normalize desired privileges for each CSV role
###############################################################################
- name: Normalize desired privileges per role
  ansible.builtin.set_fact:
    desired_privs_list: >-
      {{
        roles_csv_list
        | map(attribute='privs')
        | map('regex_replace','^\\s+','')      # trim leading whitespace
        | map('regex_replace','\\s+','')       # remove all whitespace
        | map('split', ',')                    # list of privs
        | map('unique')                        # dedupe
        | map('sort')                          # sort for consistency
        | map('join', ',')                     # back into string
        | list
      }}
  run_once: true

###############################################################################
# 3) Extract and normalize CURRENT privileges for each role
###############################################################################
- name: Extract current privileges per role (jq-free)
  ansible.builtin.set_fact:
    current_privs_list: >-
      {{
        roles_csv_list
        | map(attribute='roleid')
        | map('extract', pve_role_list, 'roleid')
        | map('first', default={})
        | map(attribute='privs', default='')
        | map('regex_replace','^\\s+','')
        | map('regex_replace','\\s+','')
        | map('split', ',')
        | map('reject','equalto','')
        | map('unique')
        | map('sort')
        | map('join', ',')
        | list
      }}
  run_once: true

###############################################################################
# 4) Debug comparison
###############################################################################
- name: DEBUG | Role diff report
  ansible.builtin.debug:
    msg:
      roleid: "{{ roles_csv_list[idx].roleid }}"
      exists: "{{ roles_csv_list[idx].roleid in existing_role_ids }}"
      desired: "{{ desired_privs_list[idx] }}"
      current: "{{ current_privs_list[idx] }}"
      will_add: "{{ roles_csv_list[idx].roleid not in existing_role_ids }}"
      will_modify: >-
        {{
          (roles_csv_list[idx].roleid in existing_role_ids)
          and (desired_privs_list[idx] != current_privs_list[idx])
        }}
  loop: "{{ range(0, roles_csv_list | length) | list }}"
  loop_control:
    index_var: idx

###############################################################################
# 5) Create roles that do not exist
###############################################################################
- name: Create role when absent
  ansible.builtin.command: >
    pveum role add {{ roles_csv_list[idx].roleid }}
    --privs "{{ desired_privs_list[idx] }}"
  loop: "{{ range(0, roles_csv_list | length) | list }}"
  loop_control:
    index_var: idx
    label: "{{ roles_csv_list[idx].roleid }}"
  when: roles_csv_list[idx].roleid not in existing_role_ids
  register: add_role
  changed_when: add_role.rc == 0
  failed_when: add_role.rc not in [0]

###############################################################################
# 6) Modify roles whose privileges differ
###############################################################################
- name: Modify role when privilege sets differ
  ansible.builtin.command: >
    pveum role modify {{ roles_csv_list[idx].roleid }}
    --privs "{{ desired_privs_list[idx] }}"
  loop: "{{ range(0, roles_csv_list | length) | list }}"
  loop_control:
    index_var: idx
    label: "{{ roles_csv_list[idx].roleid }}"
  when: >
    roles_csv_list[idx].roleid in existing_role_ids
    and (desired_privs_list[idx] != current_privs_list[idx])
  register: mod_role
  changed_when: mod_role.rc == 0
  failed_when: mod_role.rc not in [0]
