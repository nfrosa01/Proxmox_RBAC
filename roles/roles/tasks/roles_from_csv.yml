---
# roles/roles/tasks/roles_from_csv.yml
# Create/Update Proxmox custom roles from roles.csv — Fully Idempotent Version

- name: MARKER — roles/roles_from_csv.yml executing
  debug:
    msg: "Running custom role management from CSV"

###############################################################################
# 1) Load existing Proxmox roles in JSON format (safe and structured)
###############################################################################
- name: Load current PVE roles (JSON)
  ansible.builtin.command: "pveum role list --output-format=json"
  register: pve_roles_json
  changed_when: false

- name: Parse roles into usable list
  ansible.builtin.set_fact:
    pve_role_list: "{{ pve_roles_json.stdout | from_json }}"

- name: Extract only role IDs
  ansible.builtin.set_fact:
    existing_role_ids: "{{ pve_role_list | map(attribute='roleid') | list }}"

###############################################################################
# 2) Normalize desired privileges per role
###############################################################################
- name: Normalize desired privileges for each CSV role
  ansible.builtin.set_fact:
    desired_privs_list: >-
      {{
        roles_csv_list
        | map(attribute='privs')
        | map('regex_replace','^\\s+','')
        | map('regex_replace','\\s+','')
        | map('split', ',')
        | map('unique')
        | map('sort')
        | map('join', ',')
        | list
      }}
  run_once: true

###############################################################################
# 3) Extract and normalize current privileges (per role) from PVE
###############################################################################
- name: Extract current privileges for each role
  ansible.builtin.shell: |
    set -o pipefail
    pveum role list --output-format=json | \
      jq -r '.[] | select(.roleid=="{{ item.roleid }}") | .privs'
  args:
    executable: /bin/bash
  loop: "{{ roles_csv_list }}"
  loop_control:
    label: "{{ item.roleid }}"
  register: raw_current_privs
  changed_when: false

- name: Normalize current privileges list
  ansible.builtin.set_fact:
    current_privs_list: >-
      {{
        raw_current_privs.results
        | map(attribute='stdout')
        | map('regex_replace','^\\s+','')
        | map('regex_replace','\\s+','')
        | map('split', ',')
        | map('reject','equalto','')
        | map('unique')
        | map('sort')
        | map('join', ',')
        | list
      }}
  run_once: true

###############################################################################
# 4) Debug diff
###############################################################################
- name: DEBUG | role diff summary
  ansible.builtin.debug:
    msg:
      roleid: "{{ roles_csv_list[idx].roleid }}"
      exists_in_pve: "{{ roles_csv_list[idx].roleid in existing_role_ids }}"
      desired: "{{ desired_privs_list[idx] }}"
      current: "{{ current_privs_list[idx] }}"
      will_add: "{{ roles_csv_list[idx].roleid not in existing_role_ids }}"
      will_modify: >-
        {{
          (roles_csv_list[idx].roleid in existing_role_ids)
          and (desired_privs_list[idx] != current_privs_list[idx])
        }}
  loop: "{{ range(0, roles_csv_list | length) | list }}"
  loop_control:
    index_var: idx

###############################################################################
# 5) Create missing roles
###############################################################################
- name: Create custom role when it does not exist
  ansible.builtin.command: >
    pveum role add {{ roles_csv_list[idx].roleid }}
    --privs "{{ desired_privs_list[idx] }}"
  loop: "{{ range(0, roles_csv_list | length) | list }}"
  loop_control:
    index_var: idx
    label: "{{ roles_csv_list[idx].roleid }}"
  when: roles_csv_list[idx].roleid not in existing_role_ids
  register: add_role
  changed_when: add_role.rc == 0
  failed_when: add_role.rc not in [0]

###############################################################################
# 6) Modify existing roles whose privs differ
###############################################################################
- name: Modify custom role when privileges differ
  ansible.builtin.command: >
    pveum role modify {{ roles_csv_list[idx].roleid }}
    --privs "{{ desired_privs_list[idx] }}"
  loop: "{{ range(0, roles_csv_list | length) | list }}"
  loop_control:
    index_var: idx
    label: "{{ roles_csv_list[idx].roleid }}"
  when: >
    roles_csv_list[idx].roleid in existing_role_ids
    and (desired_privs_list[idx] != current_privs_list[idx])
  register: mod_role
  changed_when: mod_role.rc == 0
  failed_when: mod_role.rc not in [0]
